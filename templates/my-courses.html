{% extends "base.html" %}
{% block content %}

<div class="courses-container">
    {% for course in courses %}
    <article class="courses-box">
        <h2>{{ course.title }}</h2>
        <p>{{ course.description }}</p>

        <a href="{{ url_for('course_detail', course_id=course.id) }}" class="btn btn-primary">Start course</a>
        

        {% if course.id in completed_courses %}
        <p style="color: green; margin-top: 0.5em;"><strong>Course Complete</strong></p>
        {% endif %}

    </article>
    {% endfor %}
</div>

{% endblock %}
