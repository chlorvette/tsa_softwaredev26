{% extends "base.html" %}
{% block content %}

<div class="courses-container">
    {% for course in courses %}
    <article class="courses-box">
        <h2>{{ course.title }}</h2>
        <p>{{ course.description }}</p>
        <a href="{{ url_for('course_detail', course_id=course.id) }}">Start course</a>
    </article>
    {% endfor %}
</div>

{% endblock %}
