{% extends "base.html" %}

{% block content %}
<h1 style="text-align:center; margin-bottom: 20px;">Your Achievements</h1>

<div class="awards-container">
  {% for achievement in achievements %}
    <div class="award {% if achievement.earned %}earned{% else %}locked{% endif %}">
      <img src="{{ url_for('static', filename='images/' + achievement.name.lower().replace(' ', '_') + '.png') }}" alt="{{ achievement.name }}" style="width:80px; height:80px;">
      <p>{{ achievement.description }}</p>
    </div>
  {% endfor %}
</div>

{% endblock %}
